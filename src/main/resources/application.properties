# =============================================================================
# Application
# =============================================================================
spring.application.name=real-time-score-broadcaster
server.port=8080

# =============================================================================
# MySQL 8.0 DataSource
# =============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/score_broadcaster?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=mosiur
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================
# JPA / Hibernate (MySQL 8)
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# =============================================================================
# SQL init (sample data — runs once; switch to 'never' after first successful start)
# =============================================================================
spring.sql.init.mode=never

# =============================================================================
# JSP View Resolver
# =============================================================================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# =============================================================================
# RabbitMQ (Docker: rabbitmq4 — user/pass from RABBITMQ_DEFAULT_USER/PASS)
# =============================================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

# Application-specific RabbitMQ settings (used by RabbitMQConfig)
app.rabbitmq.exchange.score-updates=scores.fanout

# =============================================================================
# WebSocket / STOMP
# =============================================================================
# STOMP endpoint path (clients connect to ws://host:port/ws)
app.websocket.stomp-endpoint=/ws
# Topic prefix for broadcasting score updates to subscribers
app.websocket.topic.score-updates=/topic/scores

# =============================================================================
# Logging
# =============================================================================
logging.level.com.scorebroadcaster=DEBUG
logging.level.org.springframework.web.socket=INFO
logging.level.org.springframework.amqp=INFO
